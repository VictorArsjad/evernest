name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: apps/api/go.sum
      - name: build
        run: go build ./...
      - name: test
        run: go test ./... -race -count=1
      - name: golangci-lint
        # v9 is required for golangci-lint v2.x; v6 hard-pins to v1.64.8
        # which can't load go.mod targeting Go 1.26+.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/api
          args: --timeout=5m

  web:
    name: web (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
