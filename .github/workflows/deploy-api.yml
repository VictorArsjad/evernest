name: deploy-api

# Builds the API container image, publishes it to GHCR, then asks Portainer
# to redeploy the home-server stack via its API.
#
# Two triggers:
# - workflow_run on the `ci` workflow on master so we only ship a build that
#   already passed lint/tests.
# - workflow_dispatch for emergency redeploys.
#
# Promoted from the previous SSH-based path (`deploy-api.yml` v1) and the
# `deploy-api-homelab-experimental.yml` proof-of-concept that this replaces.
# Why Portainer instead of SSH: the home server is a Portainer-managed
# Git stack (`/data/compose/<id>/...`), so the host doesn't keep its own
# `git clone` of the repo and SSH-based `docker compose pull/up` would
# fight Portainer for ownership. Portainer's `git/redeploy` API
# (1) pulls the latest compose from this repo, (2) repulls `:latest`
# of the API image, (3) recreates the affected services. CI never SSHes
# and never touches the host's filesystem directly.
#
# Required repo configuration (see docs/homelab-ci-portainer.md):
#   Variables (vars):
#     PORTAINER_URL          — base URL, tailnet-reachable
#     PORTAINER_STACK_ID     — numeric stack id
#     PORTAINER_ENDPOINT_ID  — numeric endpoint id (usually 1)
#   Secrets:
#     TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET — ephemeral tailnet join
#     PORTAINER_API_KEY    — Portainer access token (ptr_…)
#     PORTAINER_GIT_TOKEN  — optional, GitHub PAT if Portainer pulls
#                            this repo as a private source
on:
  workflow_run:
    workflows: ["ci"]
    branches: [master]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Tailscale's OIDC-based join (tailscale/github-action) needs id-token.
  id-token: write

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  build-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: build + push image
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: derive tags
        id: meta
        run: |
          # GHCR requires lowercase image paths; convert here so the workflow
          # works on accounts with mixed-case usernames.
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/evernest-api"
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT="${SHA:0:7}"
          {
            echo "image=${IMAGE}"
            echo "sha_tag=${SHORT}"
            echo "tags=${IMAGE}:latest,${IMAGE}:${SHORT}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          # Home server is x86_64 Ubuntu; single-arch keeps the build fast.
          # Switch to "linux/amd64,linux/arm64" if you ever target a Pi.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: redeploy via Portainer API
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: tailscale up (ephemeral)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Some Tailscale ACLs require this hostname pattern for tag:ci nodes;
          # adjust if yours differs. Visible in the admin console for ~24h.
          hostname: gh-runner-${{ github.run_id }}

      - name: portainer git redeploy
        env:
          # URL, stack id, and endpoint id aren't sensitive (URL is tailnet-only,
          # ids are inert without the API key) so they live in `vars` for
          # auditability. Only the API key + optional git PAT are secrets.
          PORTAINER_URL: ${{ vars.PORTAINER_URL }}
          PORTAINER_STACK_ID: ${{ vars.PORTAINER_STACK_ID }}
          PORTAINER_ENDPOINT_ID: ${{ vars.PORTAINER_ENDPOINT_ID }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_GIT_TOKEN: ${{ secrets.PORTAINER_GIT_TOKEN }}
          DEPLOYED_SHA: ${{ needs.build-push.outputs.sha_tag }}
        run: |
          set -euo pipefail
          for v in PORTAINER_URL PORTAINER_API_KEY PORTAINER_STACK_ID PORTAINER_ENDPOINT_ID; do
            if [ -z "${!v:-}" ]; then
              echo "::error::$v is empty — check repo vars (URL/STACK_ID/ENDPOINT_ID) and secrets (API_KEY); see docs/homelab-ci-portainer.md"
              exit 1
            fi
          done

          # -k: Portainer ships with a self-signed TLS cert by default. We're
          # already on the tailnet (ephemeral runner joined above) so the
          # transport is encrypted end-to-end; skip CA validation rather than
          # stand up cert-fronting just for this one PUT. Revisit if/when
          # Portainer gets a real cert (e.g. Tailscale serve in front).

          # Fetch the stack's current Env array so we can echo it back to the
          # redeploy. Some Portainer versions deploy git stacks with an empty
          # env if you don't, which interpolates compose vars to "" and trips
          # the `${POSTGRES_PASSWORD:?...}` style guards. Echoing through keeps
          # Portainer's UI as the secret source of truth — CI never stores
          # these values, just round-trips them.
          ENV_JSON=$(curl -fsSLk \
            "${PORTAINER_URL%/}/api/stacks/${PORTAINER_STACK_ID}" \
            -H "X-API-Key: ${PORTAINER_API_KEY}" | jq '.Env // []')

          if [ -n "${PORTAINER_GIT_TOKEN:-}" ]; then
            BODY=$(jq -n \
              --arg user "${{ github.repository_owner }}" \
              --arg pass "$PORTAINER_GIT_TOKEN" \
              --argjson env "$ENV_JSON" \
              '{
                repullImageAndRedeploy: true,
                repositoryAuthentication: true,
                repositoryUsername: $user,
                repositoryPassword: $pass,
                env: $env
              }')
          else
            BODY=$(jq -n --argjson env "$ENV_JSON" \
              '{
                repullImageAndRedeploy: true,
                repositoryAuthentication: false,
                env: $env
              }')
          fi

          # Don't use curl -f: we want the body on HTTP errors so future
          # 4xx/5xx from Portainer surface in CI logs (this is how we learned
          # about the missing-env-interp issue the first time).
          STATUS=$(curl -sSLk -o /tmp/portainer-response -w "%{http_code}" -X PUT \
            "${PORTAINER_URL%/}/api/stacks/${PORTAINER_STACK_ID}/git/redeploy?endpointId=${PORTAINER_ENDPOINT_ID}" \
            -H "X-API-Key: ${PORTAINER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          if [ "$STATUS" -ge 400 ]; then
            echo "::error::Portainer redeploy returned HTTP $STATUS"
            echo "Response body:"
            cat /tmp/portainer-response
            echo
            exit 1
          fi

          echo "Portainer redeploy triggered (HTTP $STATUS) for image tag ${DEPLOYED_SHA} (:latest on stack)"
