openapi: 3.1.0
info:
  title: Evernest API
  version: 0.1.0
  license:
    name: MIT
    identifier: MIT
  description: |
    Baby tracking backend. All requests/responses are JSON. All authenticated
    endpoints require `Authorization: Bearer <access_token>`; the refresh
    token lives in an `httpOnly` cookie scoped to `/v1/auth`.

    ## Idempotency

    Every event POST (bottle-feeds, diapers, pumpings, nursing-sessions,
    growths) accepts a client-supplied `id` (UUIDv7) in the request body.
    Inserts use `ON CONFLICT (id) DO NOTHING`, so retrying a write with the
    same `id` returns the existing row with status `201` instead of
    erroring. If `id` is omitted the server generates one. There is no
    separate `Idempotency-Key` header — the body field IS the idempotency
    key.

    ## Errors

    All non-2xx responses share the same envelope:

    ```json
    { "error": { "code": "validation_failed", "message": "..." } }
    ```

    `code` is a stable machine-readable string (e.g. `validation_failed`,
    `unauthorized`, `not_found`). `message` is human-readable.
servers:
  - url: http://localhost:8080
    description: local dev
tags:
  - name: Health
    description: Liveness/readiness probes (unauthenticated).
  - name: Auth
    description: Registration, login, refresh, logout, and the authenticated `/me` endpoint.
  - name: Households
    description: Households group babies and members. The creator becomes the `owner`.
  - name: Invites
    description: |
      Link-based household invites. The owner mints a token; recipients
      tap the link, sign in or register, and are added to the household
      with the role the owner picked. No email is sent; the FE surfaces
      the URL for the owner to share manually.
  - name: Babies
    description: A baby belongs to exactly one household. Membership in the household authorizes all baby-scoped routes.
  - name: Bottle Feeds
    description: Logged bottle feeds (expressed breastmilk or formula). Volume in mL.
  - name: Diapers
    description: Diaper changes (wet / soiled / mixed).
  - name: Pumpings
    description: Pumping sessions (mother expressing milk). Volume in mL, optional duration.
  - name: Nursing Sessions
    description: At-the-breast feeds. Per-side duration in seconds, no volume.
  - name: Growths
    description: Growth measurements. Any combination of weight (g), height (cm), head circumference (cm); at least one required.
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [Health]
      operationId: healthLive
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
  /readyz:
    get:
      tags: [Health]
      operationId: healthReady
      summary: Readiness probe (pings the DB)
      security: []
      responses:
        "200":
          description: DB is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: DB is not reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready
                err: "dial tcp 127.0.0.1:5432: connect: connection refused"
  /v1/ping:
    get:
      tags: [Health]
      operationId: ping
      summary: Sanity check inside the v1 namespace
      security: []
      responses:
        "200":
          description: pong
          content:
            application/json:
              schema:
                type: object
                required: [pong]
                properties:
                  pong:
                    type: string
                    example: evernest

  /v1/auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new user
      description: |
        Creates a user, seeds their `user_preferences` row, issues an access
        token in the JSON body, and sets a refresh cookie scoped to
        `/v1/auth`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created. Access token in body, refresh cookie set.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/RefreshCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: A user with that email already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: user_exists
                  message: email already registered
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in with email + password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated. Access token in body, refresh cookie set.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/RefreshCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid email or password (also returned when the user does not exist, to avoid enumeration).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: invalid_credentials
                  message: invalid email or password
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Rotate the refresh token and issue a new access token
      description: |
        Reads the `evernest_refresh` cookie, rotates it (the previous token is
        marked replaced), and issues a fresh access token. If the refresh
        cookie is missing or invalid the server clears the cookie and
        responds with `401`.
      security:
        - refreshCookie: []
      responses:
        "200":
          description: Refreshed. New access token in body, rotated refresh cookie set.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/RefreshCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: No refresh cookie or the cookie's token is invalid/expired/revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                noCookie:
                  summary: Missing refresh cookie
                  value:
                    error:
                      code: no_refresh_cookie
                      message: no refresh cookie
                invalid:
                  summary: Cookie present but token is invalid/expired/revoked
                  value:
                    error:
                      code: invalid_refresh
                      message: refresh token invalid
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Log out (revoke refresh token, clear cookie)
      description: |
        Revokes the refresh token referenced by the cookie (best-effort; no
        error if the cookie is missing or the token is already revoked) and
        clears the cookie. Always responds `204`.
      security:
        - refreshCookie: []
      responses:
        "204":
          description: Logged out.

  /v1/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: The current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/households:
    post:
      tags: [Households]
      operationId: createHousehold
      summary: Create a household
      description: |
        Creates a household and adds the caller as its `owner` member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHouseholdRequest"
      responses:
        "201":
          description: Household created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Households]
      operationId: listHouseholds
      summary: List households the caller is a member of
      responses:
        "200":
          description: Households (oldest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Household"
              example:
                - id: 01919b86-3a4d-7c8a-9f1d-2c4e6a7b8d9f
                  name: The Arsjad Household
                  role: owner
                  created_at: "2026-04-01T12:34:56Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/households/{householdID}/invites:
    parameters:
      - $ref: "#/components/parameters/HouseholdIDPath"
    post:
      tags: [Invites]
      operationId: createHouseholdInvite
      summary: Issue a single-use invite link
      description: |
        Mints a single-use, URL-safe random token granting the bearer the
        right to join the household with `role`. The plaintext token is
        returned ONCE in the response (the BE only stores its SHA-256
        hash). Caller must be the household `owner`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
      responses:
        "201":
          description: Invite created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Invites]
      operationId: listHouseholdInvites
      summary: List pending (unaccepted + unexpired) invites
      description: |
        Returns every invite for the household that has neither been
        accepted nor expired. The plaintext `token` is NEVER echoed
        back — only a non-secret `token_hint` (a short, hash-derived
        display ID) plus role / expiry. Any member can list invites.
      responses:
        "200":
          description: Pending invites (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/invites/{token}:
    parameters:
      - $ref: "#/components/parameters/InviteTokenPath"
    get:
      tags: [Invites]
      operationId: getInviteInfo
      summary: Public lookup of an invite's display metadata
      description: |
        Unauthenticated lookup. Returns only the minimum metadata the FE
        needs to render a "Join {household} as {role}?" confirmation:
        household name, role, and expiry. Member list and inviter
        identity are deliberately omitted. Used / expired / unknown
        tokens uniformly return 404 to avoid token-enumeration leaks.
      security: []
      responses:
        "200":
          description: Invite is pending; metadata returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteInfo"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Invites]
      operationId: revokeInvite
      summary: Revoke an invite (owner or creator only)
      description: |
        Deletes the invite, making subsequent accept attempts return 404.
        Authorization: caller must be the inviting household's `owner`
        OR the user who created the invite. Non-authorized callers see
        the same 404 as a missing token to avoid disclosure.
      responses:
        "204":
          description: Revoked.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/invites/{token}/accept:
    parameters:
      - $ref: "#/components/parameters/InviteTokenPath"
    post:
      tags: [Invites]
      operationId: acceptInvite
      summary: Redeem an invite (authenticated)
      description: |
        Adds the calling user as a member of the inviting household with
        the invite's role, and marks the invite as consumed.

        Idempotent re-accept: if the caller is already a member of the
        household, returns 200 with the household and does NOT consume
        the invite a second time. The double-click and reload-the-redeem
        page UX patterns both end up here. Anyone *else* with the link
        can still accept normally.

        Used / expired / unknown tokens uniformly return 404.
      responses:
        "200":
          description: Joined (or already a member — idempotent).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/households/{householdID}/babies:
    parameters:
      - $ref: "#/components/parameters/HouseholdIDPath"
    post:
      tags: [Babies]
      operationId: createBaby
      summary: Create a baby in a household
      description: |
        Creates a baby and seeds a default `baby_settings` row. Caller must
        be a member of the household.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBabyRequest"
      responses:
        "201":
          description: Baby created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Baby"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Babies]
      operationId: listBabies
      summary: List babies in a household
      responses:
        "200":
          description: Babies (oldest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Baby"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/babies/{babyID}:
    parameters:
      - $ref: "#/components/parameters/BabyIDPath"
    get:
      tags: [Babies]
      operationId: getBaby
      summary: Get a baby by id
      responses:
        "200":
          description: The baby.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Baby"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/babies/{babyID}/bottle-feeds:
    parameters:
      - $ref: "#/components/parameters/BabyIDPath"
    post:
      tags: [Bottle Feeds]
      operationId: createBottleFeed
      summary: Log a bottle feed
      description: |
        Idempotent on the request body's `id` field. Replays of the same
        `id` return the existing row with `201`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBottleFeedRequest"
      responses:
        "201":
          description: Bottle feed created (or returned unchanged on idempotent replay).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BottleFeed"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Bottle Feeds]
      operationId: listBottleFeeds
      summary: List bottle feeds for a baby
      parameters:
        - $ref: "#/components/parameters/FromQuery"
        - $ref: "#/components/parameters/ToQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Bottle feeds in the [from, to) window, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BottleFeed"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/bottle-feeds/{id}:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    patch:
      tags: [Bottle Feeds]
      operationId: updateBottleFeed
      summary: Update a bottle feed
      description: |
        Partial update. Fields omitted from the request body are left
        unchanged. Server preserves `id`, `source`, `created_at`, and
        `created_by_user_id` regardless of input. To clear `notes`, send
        an empty string; omitting the field leaves notes unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBottleFeedRequest"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BottleFeed"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Bottle Feeds]
      operationId: deleteBottleFeed
      summary: Delete a bottle feed
      description: |
        Idempotent: deletes return `204` whether or not the row existed.
      responses:
        "204":
          description: Deleted (or no row matched).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/babies/{babyID}/diapers:
    parameters:
      - $ref: "#/components/parameters/BabyIDPath"
    post:
      tags: [Diapers]
      operationId: createDiaper
      summary: Log a diaper change
      description: Idempotent on the request body's `id` field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiaperRequest"
      responses:
        "201":
          description: Diaper created (or returned unchanged on idempotent replay).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diaper"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Diapers]
      operationId: listDiapers
      summary: List diaper changes for a baby
      parameters:
        - $ref: "#/components/parameters/FromQuery"
        - $ref: "#/components/parameters/ToQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Diapers in the [from, to) window, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Diaper"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/diapers/{id}:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    patch:
      tags: [Diapers]
      operationId: updateDiaper
      summary: Update a diaper change
      description: |
        Partial update. Same contract as `PATCH /v1/bottle-feeds/{id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDiaperRequest"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diaper"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Diapers]
      operationId: deleteDiaper
      summary: Delete a diaper change
      description: Idempotent.
      responses:
        "204":
          description: Deleted (or no row matched).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/babies/{babyID}/pumpings:
    parameters:
      - $ref: "#/components/parameters/BabyIDPath"
    post:
      tags: [Pumpings]
      operationId: createPumping
      summary: Log a pumping session
      description: Idempotent on the request body's `id` field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePumpingRequest"
      responses:
        "201":
          description: Pumping created (or returned unchanged on idempotent replay).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pumping"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Pumpings]
      operationId: listPumpings
      summary: List pumping sessions for a baby
      parameters:
        - $ref: "#/components/parameters/FromQuery"
        - $ref: "#/components/parameters/ToQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Pumpings in the [from, to) window, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pumping"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/pumpings/{id}:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    patch:
      tags: [Pumpings]
