      summary: Update a pumping session
      description: |
        Partial update. Same contract as `PATCH /v1/bottle-feeds/{id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePumpingRequest"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pumping"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Pumpings]
      operationId: deletePumping
      summary: Delete a pumping session
      description: Idempotent.
      responses:
        "204":
          description: Deleted (or no row matched).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/babies/{babyID}/nursing-sessions:
    parameters:
      - $ref: "#/components/parameters/BabyIDPath"
    post:
      tags: [Nursing Sessions]
      operationId: createNursingSession
      summary: Log a nursing session
      description: |
        Idempotent on the request body's `id` field. `ended_at`, when
        provided, must be `>= started_at`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNursingRequest"
      responses:
        "201":
          description: Nursing session created (or returned unchanged on idempotent replay).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Nursing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Nursing Sessions]
      operationId: listNursingSessions
      summary: List nursing sessions for a baby
      parameters:
        - $ref: "#/components/parameters/FromQuery"
        - $ref: "#/components/parameters/ToQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Nursing sessions in the [from, to) window (by `started_at`), newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Nursing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/babies/{babyID}/nursing-sessions/open:
    parameters:
      - $ref: "#/components/parameters/BabyIDPath"
    get:
      tags: [Nursing Sessions]
      operationId: getOpenNursingSession
      summary: Get the in-progress nursing session for this baby
      description: |
        Returns `200` with the open session if one exists, or `204` if no
        nursing session is currently open for this baby. The Today screen
        polls this on render to derive the "nursing now" chip without
        scanning the full per-day list.
      responses:
        "200":
          description: Open session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Nursing"
        "204":
          description: No open session for this baby.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/nursing-sessions/{id}:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    patch:
      tags: [Nursing Sessions]
      operationId: updateNursingSession
      summary: Close an open session OR edit a closed one
      description: |
        Dispatches based on the row's current `ended_at` state:

        - **Open session** (`ended_at IS NULL`): closes the session.
          Body must include `ended_at`, `left_duration_s`, and
          `right_duration_s` (all required). This is the legacy
          close-session contract. Returns `409 already_closed` if the
          row was closed by a concurrent request.
        - **Closed session** (`ended_at IS NOT NULL`): partial edit.
          All fields optional. Sending `ended_at: null` is not
          supported (edits can't re-open a closed session). The notes
          and `starting_breast` clear conventions match the other
          event PATCHes. Returns `409 session_state_changed` if the
          row was deleted or re-opened mid-edit.

        Server preserves `id`, `source`, `created_at`, and
        `created_by_user_id` regardless of input.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/EndNursingRequest"
                - $ref: "#/components/schemas/UpdateNursingRequest"
      responses:
        "200":
          description: Closed (open session path) or updated (closed session path).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Nursing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Either `already_closed` (close-path) or
            `session_state_changed` (edit-path) — see description.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Nursing Sessions]
      operationId: deleteNursingSession
      summary: Delete a nursing session
      description: Idempotent.
      responses:
        "204":
          description: Deleted (or no row matched).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/babies/{babyID}/growths:
    parameters:
      - $ref: "#/components/parameters/BabyIDPath"
    post:
      tags: [Growths]
      operationId: createGrowth
      summary: Log a growth measurement
      description: |
        Idempotent on the request body's `id` field. At least one of
        `weight_g`, `height_cm`, or `head_circumference_cm` MUST be present
        and `> 0`. The DB enforces "at least one non-NULL" via a CHECK; the
        handler enforces the `> 0` floor in Go.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrowthRequest"
      responses:
        "201":
          description: Growth created (or returned unchanged on idempotent replay).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Growth"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Growths]
      operationId: listGrowths
      summary: List growth measurements for a baby
      description: |
        The default `from`/`to` window is wider than for other event kinds
        (last 365 days through 24h from now) since growth measurements are
        infrequent.
      parameters:
        - $ref: "#/components/parameters/FromQuery"
        - $ref: "#/components/parameters/ToQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Growths in the [from, to) window (by `measured_at`), newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Growth"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/growths/{id}:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    patch:
      tags: [Growths]
      operationId: updateGrowth
      summary: Update a growth measurement
      description: |
        Partial update. Each measurement (`weight_g`, `height_cm`,
        `head_circumference_cm`) can be cleared via its companion
        `clear_*` boolean. The DB's "at least one non-NULL" CHECK is
        mirrored in Go and surfaces as `422` if a clear would empty
        the row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGrowthRequest"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Growth"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Growths]
      operationId: deleteGrowth
      summary: Delete a growth measurement
      description: Idempotent.
      responses:
        "204":
          description: Deleted (or no row matched).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  # -----------------------------------------------------------------------
  # Coming soon
  # -----------------------------------------------------------------------
  # CP3 Charts will add `GET /v1/babies/{babyID}/charts/daily` in its own
  # PR. The schema for that endpoint is intentionally NOT defined here —
  # see the parallel CP3 Charts agent's PR for the full spec.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HMAC-signed JWT access token issued by `/v1/auth/{register,login,refresh}`.
        Send as `Authorization: Bearer <token>`.
    refreshCookie:
      type: apiKey
      in: cookie
      name: evernest_refresh
      description: |
        `httpOnly`, opaque (random) refresh token. Set by
        `/v1/auth/{register,login,refresh}` and consumed by
        `/v1/auth/{refresh,logout}`. Cookie path is `/v1/auth`.

  headers:
    RefreshCookie:
      description: |
        Sets the `evernest_refresh` cookie. `HttpOnly`, `Path=/v1/auth`.
        `Secure` and `SameSite` follow the server's `PUBLIC_WEB_ORIGIN`
        and `COOKIE_SAMESITE` config.
      schema:
        type: string
      example: evernest_refresh=opaque-random-token; Path=/v1/auth; Max-Age=2592000; HttpOnly; Secure; SameSite=Lax

  parameters:
    HouseholdIDPath:
      name: householdID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 01919b86-3a4d-7c8a-9f1d-2c4e6a7b8d9f
      description: Household UUID.
    InviteTokenPath:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 64
        pattern: ^[A-Za-z0-9_-]+$
      example: 3xK2-9aBcD8fE7gH6iJ5kL
      description: |
        URL-safe base64 invite token (`crypto/rand` 16 bytes → 22 chars,
        no padding). Treat it as a one-time secret; only the SHA-256 hash
        is persisted server-side.
    BabyIDPath:
      name: babyID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 01919b87-9a8c-7f2d-b1c3-4d5e6f7a8b9c
      description: Baby UUID.
    IDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 01919b88-1c2d-7e3f-a4b5-c6d7e8f9a0b1
      description: Resource UUID (event id).
    FromQuery:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
      example: "2026-05-26T00:00:00Z"
      description: |
        Inclusive lower bound (RFC3339). Defaults to 24h ago for events,
        365 days ago for growths.
    ToQuery:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
      example: "2026-05-27T00:00:00Z"
      description: |
        Exclusive upper bound (RFC3339). Defaults to now+24h. `from` must
        be strictly before `to`.
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 200
      example: 200
      description: Max rows returned. Out-of-range values are silently clamped to the default.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
              example: validation_failed
            message:
              type: string
              description: Human-readable message (may be the raw validator output).
              example: "Key: 'createReq.AmountML' Error:Field validation for 'AmountML' failed on the 'gt' tag"
      example:
        error:
          code: validation_failed
          message: "Key: 'createReq.AmountML' Error:Field validation for 'AmountML' failed on the 'gt' tag"

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
        err:
          type: string
          description: Present only on `not_ready` from `/readyz`.
          example: "dial tcp 127.0.0.1:5432: connect: connection refused"

    User:
      type: object
      required: [id, email, display_name, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 01919b85-1c2d-7e3f-a4b5-c6d7e8f9a0b1
        email:
          type: string
          format: email
          example: victor@example.com
        display_name:
          type: string
          example: Victor
        created_at:
          type: string
          format: date-time
          example: "2026-04-01T12:34:56Z"
      example:
        id: 01919b85-1c2d-7e3f-a4b5-c6d7e8f9a0b1
        email: victor@example.com
        display_name: Victor
        created_at: "2026-04-01T12:34:56Z"

    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: Lowercased and trimmed server-side.
          example: victor@example.com
        password:
          type: string
          minLength: 8
          maxLength: 200
          format: password
          example: "correct horse battery staple"
        display_name:
          type: string
          minLength: 1
          maxLength: 80
          example: Victor

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: victor@example.com
        password:
          type: string
          format: password
          example: "correct horse battery staple"

    TokenResponse:
      type: object
      required: [access_token, expires_at, user]
      properties:
        access_token:
          type: string
          description: "JWT access token. Send as `Authorization: Bearer <token>`."
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIwMTkxOWI4NS0xYzJkLTdlM2YtYTRiNS1jNmQ3ZThmOWEwYjEiLCJleHAiOjE3MTcwMDAwMDB9.signature
        expires_at:
          type: string
          format: date-time
          description: Access token expiry (RFC3339).
          example: "2026-05-26T11:34:56Z"
        user:
          $ref: "#/components/schemas/User"

    Household:
      type: object
      required: [id, name, role, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 01919b86-3a4d-7c8a-9f1d-2c4e6a7b8d9f
        name:
          type: string
          example: The Arsjad Household
        role:
          type: string
          description: |
            The caller's role in this household. `owner` can create + revoke
            invites and is granted on household creation; `caregiver` can
            see all data and log events but cannot invite new members.
          enum: [owner, caregiver]
          example: owner
        created_at:
          type: string
          format: date-time
          example: "2026-04-01T12:34:56Z"

    CreateHouseholdRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          example: The Arsjad Household

    Invite:
      type: object
      required: [token_hint, role, expires_at, created_at, created_by]
      properties:
        token:
          type: string
          description: |
            Plaintext URL-safe token. Present on create (POST) only; the
            list endpoint never echoes this. Treat as a one-time secret.
          example: 3xK2-9aBcD8fE7gH6iJ5kL
        token_hint:
          type: string
          description: |
            Short, non-secret display ID for the invite. Derived from
            the SHA-256 of the token; identical shape on create + list
            so a freshly-minted invite matches its list row.
          example: kJ9aBcD8
        invite_url:
          type: string
          format: uri
          description: |
            Full URL the FE should surface for sharing. Built as
            `<PUBLIC_WEB_ORIGIN>/invite/<token>`. Present on create only.
          example: http://localhost:5173/invite/3xK2-9aBcD8fE7gH6iJ5kL
        role:
          type: string
          enum: [owner, caregiver]
          example: caregiver
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        accepted_at:
          type: string
          format: date-time
          nullable: true

    InviteInfo:
      type: object
      required: [household_name, role, expires_at]
      properties:
        household_name:
          type: string
          example: The Arsjad Household
        role:
          type: string
          enum: [owner, caregiver]
          example: caregiver
        expires_at:
          type: string
          format: date-time

    CreateInviteRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, caregiver]
          description: Role granted to the joiner once they accept.
          example: caregiver
        expires_in_hours:
          type: integer
          minimum: 1
          maximum: 720
          default: 168
          description: |
            How long the invite remains valid. Defaults to 168 (7 days).
            Maximum 720 (30 days) — a deliberate cap so an unused invite
            doesn't linger indefinitely.

    Baby:
      type: object
      required: [id, household_id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 01919b87-9a8c-7f2d-b1c3-4d5e6f7a8b9c
        household_id:
          type: string
          format: uuid
          example: 01919b86-3a4d-7c8a-9f1d-2c4e6a7b8d9f
        name:
          type: string
          example: Mira
        date_of_birth:
          type: string
          format: date
          description: Date in `YYYY-MM-DD`. Omitted if unknown.
          example: "2026-03-15"
        sex:
          type: string
          enum: [female, male, unspecified]
          description: Omitted if unspecified by client (the column is nullable).
          example: female
        created_at:
          type: string
          format: date-time
          example: "2026-04-02T08:00:00Z"

    CreateBabyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          example: Mira
        date_of_birth:
          type: string
          format: date
          description: |
            `YYYY-MM-DD`. Empty string is treated the same as omitted.
          example: "2026-03-15"
        sex:
          type: string
          enum: [female, male, unspecified]
          example: female

    BottleFeed:
      type: object
      required: [id, baby_id, occurred_at, milk_source, amount_ml, source, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 01919b88-1c2d-7e3f-a4b5-c6d7e8f9a0b1
        baby_id:
          type: string
          format: uuid
          example: 01919b87-9a8c-7f2d-b1c3-4d5e6f7a8b9c
        occurred_at:
          type: string
          format: date-time
          example: "2026-05-26T08:30:00Z"
        milk_source:
          type: string
          enum: [breast, formula]
          example: breast
        amount_ml:
          type: number
          format: double
          exclusiveMinimum: 0
          maximum: 2000
          example: 120
        notes:
          type: string
          example: "took it eagerly"
        source:
          type: string
          description: How the row was created. Always `manual` from this endpoint; importers may set other values.
          example: manual
        created_at:
          type: string
          format: date-time
          example: "2026-05-26T08:30:01Z"

    CreateBottleFeedRequest:
      type: object
      required: [occurred_at, milk_source, amount_ml]
      properties:
        id:
          type: string
          format: uuid
          description: |
            Optional client-supplied UUIDv7. Used for idempotency: replays
            with the same `id` return the existing row.
          example: 01919b88-1c2d-7e3f-a4b5-c6d7e8f9a0b1
        occurred_at:
          type: string
          format: date-time
          example: "2026-05-26T08:30:00Z"
        milk_source:
          type: string
          enum: [breast, formula]
          example: breast
        amount_ml:
          type: number
          format: double
          exclusiveMinimum: 0
          maximum: 2000
          description: Volume in millilitres. Must be `> 0` and `<= 2000`.
          example: 120
        notes:
          type: string
          example: "took it eagerly"

    UpdateBottleFeedRequest:
      type: object
      description: |
        All fields optional. Omitted fields are left unchanged. Send an
        empty string for `notes` to clear it.
      properties:
        occurred_at:
          type: string
          format: date-time
          example: "2026-05-26T08:30:00Z"
        milk_source:
          type: string
          enum: [breast, formula]
          example: breast
        amount_ml:
          type: number
          format: double
          exclusiveMinimum: 0
          maximum: 2000
          example: 120
        notes:
          type: string
          example: "took it eagerly"

    Diaper:
      type: object
      required: [id, baby_id, occurred_at, type, source, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 01919b89-2d3e-7f4a-b5c6-d7e8f9a0b1c2
        baby_id:
          type: string
          format: uuid
          example: 01919b87-9a8c-7f2d-b1c3-4d5e6f7a8b9c
