    Pumping:
      type: object
      required: [id, baby_id, occurred_at, amount_ml, source, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 01919b8a-3e4f-7a5b-c6d7-e8f9a0b1c2d3
        baby_id:
          type: string
          format: uuid
          example: 01919b87-9a8c-7f2d-b1c3-4d5e6f7a8b9c
        occurred_at:
          type: string
          format: date-time
          example: "2026-05-26T10:00:00Z"
        amount_ml:
          type: number
          format: double
          minimum: 0
          maximum: 2000
          example: 90
        duration_seconds:
          type: integer
          minimum: 0
          maximum: 21600
          description: Pumping duration in seconds (0..6h). Optional.
          example: 1200
        notes:
          type: string
          example: "morning session"
        source:
          type: string
          example: manual
        created_at:
          type: string
          format: date-time
          example: "2026-05-26T10:00:01Z"

    CreatePumpingRequest:
      type: object
      required: [occurred_at, amount_ml]
      properties:
        id:
          type: string
          format: uuid
          description: Optional client-supplied UUIDv7 for idempotency.
          example: 01919b8a-3e4f-7a5b-c6d7-e8f9a0b1c2d3
        occurred_at:
          type: string
          format: date-time
          example: "2026-05-26T10:00:00Z"
        amount_ml:
          type: number
          format: double
          minimum: 0
          maximum: 2000
          description: Volume in mL. Note `>= 0` (zero is allowed for "tracked but no output").
          example: 90
        duration_seconds:
          type: integer
          minimum: 0
          maximum: 21600
          example: 1200
        notes:
          type: string
          example: "morning session"

    UpdatePumpingRequest:
      type: object
      description: |
        All fields optional. Omitted fields are left unchanged. Send an
        empty string for `notes` to clear it.
      properties:
        occurred_at:
          type: string
          format: date-time
          example: "2026-05-26T10:00:00Z"
        amount_ml:
          type: number
          format: double
          minimum: 0
          maximum: 2000
          example: 90
        duration_seconds:
          type: integer
          minimum: 0
          maximum: 21600
          example: 1200
        notes:
          type: string
          example: "morning session"

    Nursing:
      type: object
      required:
        - id
        - baby_id
        - started_at
        - nursing_side
        - left_duration_s
        - right_duration_s
        - source
        - created_at
      properties:
        id:
          type: string
          format: uuid
          example: 01919b8b-4f5a-7b6c-d7e8-f9a0b1c2d3e4
        baby_id:
          type: string
          format: uuid
          example: 01919b87-9a8c-7f2d-b1c3-4d5e6f7a8b9c
        started_at:
          type: string
          format: date-time
          example: "2026-05-26T11:00:00Z"
        ended_at:
          type: string
          format: date-time
          example: "2026-05-26T11:25:00Z"
        starting_breast:
          type: string
          enum: [left, right]
          description: Which breast started the session. Optional even when `nursing_side` is `both`.
          example: left
        nursing_side:
          type: string
          enum: [left, right, both]
          example: both
        left_duration_s:
          type: integer
          minimum: 0
          maximum: 21600
          example: 600
        right_duration_s:
          type: integer
          minimum: 0
          maximum: 21600
          example: 900
        notes:
          type: string
          example: "fell asleep on right"
        source:
          type: string
          example: manual
        created_at:
          type: string
          format: date-time
          example: "2026-05-26T11:25:01Z"

    CreateNursingRequest:
      type: object
      required: [started_at, nursing_side]
      properties:
        id:
          type: string
          format: uuid
          description: Optional client-supplied UUIDv7 for idempotency.
          example: 01919b8b-4f5a-7b6c-d7e8-f9a0b1c2d3e4
        started_at:
          type: string
          format: date-time
          example: "2026-05-26T11:00:00Z"
        ended_at:
          type: string
          format: date-time
          description: Optional. When provided, must be `>= started_at`.
          example: "2026-05-26T11:25:00Z"
        starting_breast:
          type: string
          enum: [left, right]
          description: Optional even when `nursing_side` is `both`.
          example: left
        nursing_side:
          type: string
          enum: [left, right, both]
          example: both
        left_duration_s:
          type: integer
          minimum: 0
          maximum: 21600
          example: 600
        right_duration_s:
          type: integer
          minimum: 0
          maximum: 21600
          example: 900
        notes:
          type: string
          example: "fell asleep on right"

    EndNursingRequest:
      type: object
      required: [ended_at, left_duration_s, right_duration_s]
      description: |
        Body shape for closing an OPEN nursing session via
        `PATCH /v1/nursing-sessions/{id}`. All three fields required.
      properties:
        ended_at:
          type: string
          format: date-time
          example: "2026-05-26T11:25:00Z"
        left_duration_s:
          type: integer
          minimum: 0
          maximum: 21600
          example: 600
        right_duration_s:
          type: integer
          minimum: 0
          maximum: 21600
          example: 900

    UpdateNursingRequest:
      type: object
      description: |
        Body shape for editing a CLOSED nursing session via
        `PATCH /v1/nursing-sessions/{id}`. All fields optional. Set
        `clear_starting_breast: true` to clear that nullable column.
        Send an empty string for `notes` to clear it.
      properties:
        started_at:
          type: string
          format: date-time
          example: "2026-05-26T11:00:00Z"
        ended_at:
          type: string
          format: date-time
          description: When provided, must be `>= started_at`.
          example: "2026-05-26T11:25:00Z"
        starting_breast:
          type: string
          enum: [left, right]
          example: left
        clear_starting_breast:
          type: boolean
          example: false
        nursing_side:
          type: string
          enum: [left, right, both]
          example: both
        left_duration_s:
          type: integer
          minimum: 0
          maximum: 21600
          example: 600
        right_duration_s:
          type: integer
          minimum: 0
          maximum: 21600
          example: 900
        notes:
          type: string
          example: "fell asleep on right"

    Growth:
      type: object
      required: [id, baby_id, measured_at, source, created_at]
      properties:
        id:
          type: string
          format: uuid
          example: 01919b8c-5a6b-7c7d-e8f9-a0b1c2d3e4f5
        baby_id:
          type: string
          format: uuid
          example: 01919b87-9a8c-7f2d-b1c3-4d5e6f7a8b9c
        measured_at:
          type: string
          format: date-time
          example: "2026-05-26T07:00:00Z"
        weight_g:
          type: number
          format: double
          description: Grams. `> 0` and `< 30000`.
          example: 5400
        height_cm:
          type: number
          format: double
          description: Centimetres. `> 0` and `< 200`.
          example: 58.5
        head_circumference_cm:
          type: number
          format: double
          description: Centimetres. `> 0` and `< 80`.
          example: 39.2
        notes:
          type: string
          example: "post-bath"
        source:
          type: string
          example: manual
        created_at:
          type: string
          format: date-time
          example: "2026-05-26T07:00:01Z"

    CreateGrowthRequest:
      type: object
      required: [measured_at]
      description: |
        At least one of `weight_g`, `height_cm`, `head_circumference_cm`
        must be present and `> 0`.
      properties:
        id:
          type: string
          format: uuid
          description: Optional client-supplied UUIDv7 for idempotency.
          example: 01919b8c-5a6b-7c7d-e8f9-a0b1c2d3e4f5
        measured_at:
          type: string
          format: date-time
          example: "2026-05-26T07:00:00Z"
        weight_g:
          type: number
          format: double
          exclusiveMinimum: 0
          exclusiveMaximum: 30000
          example: 5400
        height_cm:
          type: number
          format: double
          exclusiveMinimum: 0
          exclusiveMaximum: 200
          example: 58.5
        head_circumference_cm:
          type: number
          format: double
          exclusiveMinimum: 0
          exclusiveMaximum: 80
          example: 39.2
        notes:
          type: string
          example: "post-bath"

    UpdateGrowthRequest:
      type: object
      description: |
        All fields optional. Omitted fields are left unchanged. Each
        measurement can be explicitly cleared via its companion
        `clear_*_g` / `clear_*_cm` boolean. The "at least one non-NULL
        measurement" invariant is enforced after the merge: if a clear
        would empty the row, the server returns `422`. Send an empty
        string for `notes` to clear it.
      properties:
        measured_at:
          type: string
          format: date-time
          example: "2026-05-26T07:00:00Z"
        weight_g:
          type: number
          format: double
          exclusiveMinimum: 0
          exclusiveMaximum: 30000
          example: 5400
        clear_weight_g:
          type: boolean
          example: false
        height_cm:
          type: number
          format: double
          exclusiveMinimum: 0
          exclusiveMaximum: 200
          example: 58.5
        clear_height_cm:
          type: boolean
          example: false
        head_circumference_cm:
          type: number
          format: double
          exclusiveMinimum: 0
          exclusiveMaximum: 80
          example: 39.2
        clear_head_circumference_cm:
          type: boolean
          example: false
        notes:
          type: string
          example: "post-bath"

  responses:
    BadRequest:
      description: Malformed request body, query parameter, or path id.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            badJSON:
              summary: Body could not be decoded
              value:
                error:
                  code: bad_request
                  message: "json: unknown field \"foo\""
            badID:
              summary: Path id is not a valid UUID
              value:
                error:
                  code: bad_id
                  message: invalid baby id
            badRange:
              summary: from/to query parameter is malformed or inverted
              value:
                error:
                  code: bad_range
                  message: from must be RFC3339
    Unauthorized:
      description: Missing/invalid bearer token (or, on `/v1/auth/refresh`, a missing/invalid refresh cookie).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: unauthorized
              message: missing bearer token
    Forbidden:
      description: The caller is authenticated but not a member of the household that owns the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: forbidden
              message: not a member of this household
    NotFound:
      description: The household or baby referenced in the path does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: not_found
              message: baby not found
    ValidationError:
      description: |
        Request was syntactically valid JSON but failed semantic validation
        (struct tag rules, enum constraints, range bounds, etc.). The
        `message` field is the raw validator output.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            missingField:
              summary: Required field missing
              value:
                error:
                  code: validation_failed
                  message: "Key: 'createReq.OccurredAt' Error:Field validation for 'OccurredAt' failed on the 'required' tag"
            outOfRange:
              summary: Numeric value out of range
              value:
                error:
                  code: validation_failed
                  message: "Key: 'createReq.AmountML' Error:Field validation for 'AmountML' failed on the 'gt' tag"
            growthAllNull:
              summary: Growth POST with no measurements
              value:
                error:
                  code: validation_failed
                  message: "at least one of weight_g, height_cm, head_circumference_cm is required"
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: internal
              message: could not create baby
