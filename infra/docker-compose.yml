name: evernest

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evernest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evernest_dev}
      POSTGRES_DB: ${POSTGRES_DB:-evernest}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-evernest} -d $${POSTGRES_DB:-evernest}"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: ["dev", "prod"]

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-evernest}:${POSTGRES_PASSWORD:-evernest_dev}@db:5432/${POSTGRES_DB:-evernest}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:5173}
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-http://localhost:5173}
    ports:
      - "${API_PORT:-8080}:8080"
    profiles: ["dev", "prod"]

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      - api
    profiles: ["prod"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    profiles: ["prod"]

volumes:
  db-data:
  caddy-data:
  caddy-config:
